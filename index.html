<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>혚쾌 레코드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            letter-spacing: -0.03em;
            background-color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            /* iOS 바운스 방지 및 전체 높이 고정 */
            height: 100%;
            position: fixed;
            width: 100%;
        }
        
        .bg-theme-blue {
            background: linear-gradient(180deg, #f4f8fc 0%, #ffffff 100%);
            min-height: 100%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .animate-bounce-custom { animation: bounce 1s infinite ease-in-out; }

        .app-container { 
            max-width: 480px; 
            margin: 0 auto; 
            height: 100dvh; /* iOS 주소창 대응 */
            position: relative; 
            background-color: #ffffff;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; /* iOS 스크롤 관성 및 부드러움 확보 */
        }

        /* 뷰 공통 스타일: 최소 높이를 부모만큼 확보 */
        .view-section {
            min-height: 100%;
            display: none;
            flex-direction: column;
        }

        .view-section.active {
            display: flex;
        }

        .cloud-menu-card {
            background: #f9fbff;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
            border: 1px solid #f0f4fa;
        }
        .cloud-menu-card:active {
            transform: scale(0.97);
            background: #f0f4fa;
        }

        #custom-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            z-index: 9999;
            display: none;
            text-align: center;
            min-width: 200px;
        }

        .media-cover { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    </style>
</head>
<body class="text-gray-800 antialiased selection:bg-blue-200">

                    <button onclick="startGacha()" class="flex-1 py-3 bg-gray-50 rounded-xl text-gray-600 font-bold hover:bg-gray-100 transition-colors active:scale-95">↺ 다시 뽑기</button>

    <div id="custom-toast"></div>

    <script>
        const SPREADSHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC80s5f91fT_g0tIDmNTTGbhihJqxC6VeNQ643GjbeVB25_-ycP0Tj-uhaz3d4cqOVkjU829dO8TT3/pub?gid=0&single=true&output=csv";

        const state = {
            view: 'index',
            items: []
        };

        function showAlert(msg) {
            const toast = document.getElementById('custom-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        async function init() {
            await loadData();
            navigate('index');
        }

        async function loadData() {
            try {
                const response = await fetch(SPREADSHEET_CSV_URL);
                if (!response.ok) throw new Error("Network response was not ok");
                const csvText = await response.text();
                state.items = parseCSV(csvText);
                
                const gachaPool = state.items.filter(item => item.mediaUrl && item.mediaUrl.trim() !== '');
                const gachaSubtitle = document.getElementById('gacha-subtitle');
                if (gachaSubtitle) {
                    gachaSubtitle.innerText = `${gachaPool.length}개의 떡밥 중 당신이 만날 떡밥은?`;
                }
            } catch (error) {
                console.error("Data Load Error:", error);
                if(state.items.length === 0) {
                     showAlert("데이터를 불러오지 못했습니다.");
                }
            }
        }

        function parseCSV(str) {
            const arr = [];
            const lines = str.split(/\r?\n/);
            if (lines.length < 2) return arr;
            const headers = splitCSVLine(lines[0]);

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const values = splitCSVLine(lines[i]);
                const obj = {};
                headers.forEach((h, idx) => {
                    if(!h) return;
                    let val = values[idx] || '';
                    let key = h.trim();
                    val = val.replace(/^"|"$/g, '').trim(); 
                    if(key === '제목') obj.title = val;
                    if(key === '날짜') obj.date = val;
                    if(key === '썸네일') obj.mediaUrl = val.split(/[\s,]+/)[0].trim();
                    if(key === '링크') obj.link = val;
                    obj[key] = val; 
                });
                if(obj.title) arr.push(obj);
            }
            return arr;
        }

        function splitCSVLine(line) {
            const result = [];
            let cur = '';
            let inQuote = false;
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') inQuote = !inQuote;
                else if (char === ',' && !inQuote) {
                    result.push(cur);
                    cur = '';
                } else cur += char;
            }
            result.push(cur);
            return result;
        }

        function navigate(viewName) {
            // 모든 뷰 비활성화
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('active');
            });
            
            // 타겟 뷰 활성화
            const targetView = document.getElementById(`view-${viewName}`);
            if(targetView) {
                targetView.classList.add('active');
            }
            
            // 스크롤 위치 상단 초기화
            document.getElementById('app').scrollTop = 0;

            if (viewName === 'anniversary') initAnniversary();
        }

        function initAnniversary() {
            const list = document.getElementById('anniversary-list');
            const dateText = document.getElementById('anniversary-date-text');
            list.innerHTML = '';
            
            const today = new Date();
            const m1 = String(today.getMonth() + 1).padStart(2, '0');
            const d1 = String(today.getDate()).padStart(2, '0');
            const m2 = String(today.getMonth() + 1);
            const d2 = String(today.getDate());
            
            dateText.innerText = `${m2}월 ${d2}일의 기록`;

            const matches = state.items.filter(item => {
                if(!item.date) return false;
                const d = item.date;
                return d.includes(`-${m1}-${d1}`) || d.includes(`-${m2}-${d2}`) || 
                       d.includes(`.${m1}.${d1}`) || d.includes(`.${m2}.${d2}`) ||
                       d.includes(`${m2}월 ${d2}일`) || d.includes(`${m1}월 ${d1}일`);
            });

            if (matches.length === 0) {
                list.innerHTML = `<div class="bg-white rounded-3xl p-8 text-center shadow-sm border border-gray-100 mt-4"><p class="text-gray-500 font-medium">기록된 떡밥이 없어요.</p></div>`;
                return;
            }

            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-2xl p-4 flex gap-4 shadow-sm border border-gray-50 cursor-pointer active:scale-[0.98]";
                div.onclick = () => { if(item.link) window.open(item.link, '_blank'); };
                let thumbSrc = item.mediaUrl || 'https://images.unsplash.com/photo-1594322436404-5a0526db4d13?w=100&auto=format&fit=crop';
                div.innerHTML = `
                    <div class="w-16 h-16 bg-gray-100 rounded-xl overflow-hidden shrink-0">
                        <img src="${thumbSrc}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1594322436404-5a0526db4d13?w=100&auto=format&fit=crop'">
                    </div>
                    <div class="flex flex-col justify-center">
                        <div class="font-bold text-gray-800 text-sm mb-1 line-clamp-2">${item.title}</div>
                        <div class="text-xs text-blue-400 font-medium">${item.date}</div>
                    </div>`;
                list.appendChild(div);
            });
        }

        function renderMediaElement(item, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(!item) return;
            const img = document.createElement('img');
            img.src = item.mediaUrl;
            img.className = 'media-cover';
            img.onerror = function() { this.src = 'https://images.unsplash.com/photo-1594322436404-5a0526db4d13?q=80&w=400&auto=format&fit=crop'; };
            container.appendChild(img);
        }

        function startGacha() {
            const gachaPool = state.items.filter(item => item.mediaUrl && item.mediaUrl.trim() !== '');
            if(gachaPool.length === 0) {
                showAlert("뽑을 수 있는 떡밥이 없습니다.");
                return;
            }
            navigate('gachaLoading');
            setTimeout(() => {
                const item = gachaPool[Math.floor(Math.random() * gachaPool.length)];
                renderMediaElement(item, 'gacha-media');
                document.getElementById('gacha-title').innerText = item.title;
                document.getElementById('gacha-date').innerText = item.date;
                const linkBtn = document.getElementById('gacha-link-btn');
                if(item.link) {
                    linkBtn.onclick = () => window.open(item.link, '_blank');
                    linkBtn.classList.remove('hidden');
                } else {
                    linkBtn.classList.add('hidden');
                }
                navigate('gachaResult');
            }, 1200);
        }

        window.onload = init;
    </script>
</body>
</html>
