        return alert("Google Apps Script 웹 앱 URL이 설정되지 않았습니다.");
      }

      let selectedIndices = [];
      if (typeof indexOrEvent === 'number') {
        selectedIndices.push(indexOrEvent);
      } else {
        selectedIndices = IMPORTED_TEMP_DATA.map((item, idx) => item.selected ? idx : -1).filter(idx => idx !== -1);
      }

      if (selectedIndices.length === 0) {
        return alert("선택된 항목이 없습니다.");
      }

      if (!confirm(`선택한 ${selectedIndices.length}개의 항목을 Raw 시트에서 영구 삭제하시겠습니까?`)) return;

      const bulkBtn = document.getElementById('bulk-delete-btn');
      if (bulkBtn) bulkBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 loading-spin inline-block align-middle mr-1"></i> 삭제중...';

      let successCount = 0;
      let failCount = 0;
      let lastError = "";

      for (let i = 0; i < selectedIndices.length; i++) {
        const idx = selectedIndices[i];
        const item = IMPORTED_TEMP_DATA[idx];
        const btn = document.getElementById(`del-raw-btn-${idx}`);
        if(btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 loading-spin inline-block align-middle"></i>';

        try {
          const res = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: "deleteRaw", link: item.link })
          });
          const result = await res.json();
          if (result.status === "success") {
            item._deleted = true;
            successCount++;
          } else {
            throw new Error(result.message || "Apps Script 내부 오류");
          }
        } catch (err) { 
          lastError = err.message;
          failCount++;
        }
      }

      IMPORTED_TEMP_DATA = IMPORTED_TEMP_DATA.filter(item => !item._deleted);

      if (failCount > 0) {
        alert(`부분 실패가 발생했습니다.\n- 성공: ${successCount}건\n- 실패: ${failCount}건\n\n[마지막 에러] ${lastError}`);

        alert(`총 ${successCount}건のデータが Raw シートから正常に削除されました。`);

    window.handleImportFetch = async () => {
      state.isLoading = true;

      try {

        const rows = parseCSV(text);

        if (rows.length > 0 && rows[0][0] && rows[0][0].includes('제목')) rows.shift();

        let rawDataList = rows.map((row, index) => {
          if (!row || row.length < 2 || !row[0]) return null;
          const title = (row[0] || '').trim();
          let rawDate = (row[1] || '').trim();
          let dateStr = rawDate.replace(/[\.\s\/]/g, '-').replace(/-+/g, '-');
          if (dateStr.includes('-')) {
            const parts = dateStr.split('-');
            if (parts.length >= 3) dateStr = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
          }
          const link = (row[2] || '').trim();
          const account = (row[3] || '').trim();
          const mainType = (row[4] || '기타').trim(); 
          const type = (row[5] || '기타').trim();   
          const rawKeywords = (row[6] || '').trim(); 
          const img = (row[7] || '').trim();         
          return { id: 'raw_' + index, mainType, type, date: dateStr, title, img, link, rawKeywords, account, selected: false };
        }).filter(item => item && item.title);

        const accountFilter = state.importTempId.toLowerCase();
        const startDate = state.importStartDate;
        const endDate = state.importEndDate;

        IMPORTED_TEMP_DATA = rawDataList.filter(item => {
          let pass = true;
          if (accountFilter && !(item.account.toLowerCase().includes(accountFilter))) pass = false;
          if (startDate && item.date < startDate) pass = false;
          if (endDate && item.date > endDate) pass = false;
          return pass;
        });

        state.hasSearchedImport = true;
      } catch (err) {
        alert("Raw 데이터를 불러오지 못했습니다. 에러: " + err.message);
      }
      
      state.isLoading = false;
      render();

    window.publishSelectedRawData = async (indexOrEvent) => {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes("여기에_앱스스크립트")) {
        return alert("Google Apps Script 웹 앱 URL이 설정되지 않았습니다.");
      }

      let selectedIndices = [];
      if (typeof indexOrEvent === 'number') {
        selectedIndices.push(indexOrEvent);
      } else {
        selectedIndices = IMPORTED_TEMP_DATA.map((item, idx) => item.selected ? idx : -1).filter(idx => idx !== -1);
      }

      if (selectedIndices.length === 0) {
        return alert("선택된 항목이 없습니다.");
      }

      if (!confirm(`선택한 ${selectedIndices.length}개의 항목을 게시하겠습니까?`)) return;

      const bulkBtn = document.getElementById('bulk-publish-btn');
      if(bulkBtn) bulkBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 loading-spin inline-block align-middle mr-1"></i> 처리중...';
      
      let successCount = 0;
      let failCount = 0;
      let lastError = "";

      for (let i = 0; i < selectedIndices.length; i++) {
        const idx = selectedIndices[i];
        const item = IMPORTED_TEMP_DATA[idx];
        const btn = document.getElementById(`publish-btn-${idx}`);
        if(btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-3 h-3 loading-spin inline-block align-middle mr-1"></i>';

        try {
          const rowData = [item.title, item.date, item.link, item.account, item.mainType, item.type, item.rawKeywords, item.img];
          
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: "publish", data: rowData })
          });

          if (!response.ok) throw new Error(`HTTP ${response.status} Error`);

          const result = await response.json();
          if (result.status === "success") {
            item.id = Date.now() + i;
            item.searchData = `${item.title} ${item.account} ${item.rawKeywords} ${item.mainType} ${item.type} ${item.date}`.toLowerCase();
            MOCK_ARCHIVE_DATA.push(item); 
            item._published = true;
            successCount++;
          } else {
            throw new Error(result.message || "Apps Script 내부 오류");
          }
        } catch (err) {
          lastError = err.message;
          failCount++;
        }
      }

      IMPORTED_TEMP_DATA = IMPORTED_TEMP_DATA.filter(item => !item._published);

      if (failCount > 0) {
        alert(`부분 실패가 발생했습니다.\n- 성공: ${successCount}건\n- 실패: ${failCount}건\n\n[마지막 에러] ${lastError}`);
      } else {
        alert(`총 ${successCount}건의 데이터가 시트에 성공적으로 게시되었습니다.`);
      }
      
      render();
    };

    function parseCSV(str) {
      const arr = [];
      let quote = false;
      let row = 0, col = 0;
      for (let c = 0; c < str.length; c++) {
        let cc = str[c], nc = str[c+1];
        arr[row] = arr[row] || [];
        arr[row][col] = arr[row][col] || '';
        if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
        if (cc == '"') { quote = !quote; continue; }
        if (cc == ',' && !quote) { ++col; continue; }
        if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
        if (cc == '\n' && !quote) { ++row; col = 0; continue; }
        if (cc == '\r' && !quote) { ++row; col = 0; continue; }
        arr[row][col] += cc;
      }
      return arr;
    }

            state.selectedDate = null;
          }

          let calGrid = '';
          for(let i=0; i<firstDay; i++) calGrid += `<div></div>`;
          for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const isToday = todayStr === dateStr;
            calGrid += `<div onclick="setSelectedDate('${dateStr}')" class="flex flex-col items-center justify-center h-12 cursor-pointer group"><div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold ${isSelected ? 'bg-red-600 text-white' : isToday ? 'text-red-500 bg-neutral-800' : 'text-gray-300 group-hover:bg-neutral-800'}">${d}</div>${activeDays.includes(d) ? `<div class="w-1 h-1 bg-red-500 rounded-full mt-0.5"></div>` : ''}</div>`;
          }
          
          let displayData = [];
          let displayTitle = '';
          if (state.selectedDate) {
            displayData = getSortedData(MOCK_ARCHIVE_DATA.filter(item => item.date === state.selectedDate));
            displayTitle = `${state.selectedDate} ${T.calAdmin}`;
          } else {
            displayData = getSortedData(currentMonthData);
            displayTitle = `${state.viewMonth}${T.month} ${T.calAdmin}`;
          }

          contentHTML = `
            <div class="animate-in fade-in duration-300">
              ${getCalendarHeaderHTML()}
              <div class="grid grid-cols-7 text-[10px] text-gray-500 font-bold mb-2 text-center"><div>${T.daySun}</div><div>${T.dayMon}</div><div>${T.dayTue}</div><div>${T.dayWed}</div><div>${T.dayThu}</div><div>${T.dayFri}</div><div>${T.daySat}</div></div>
              <div class="grid grid-cols-7 gap-y-1 mb-8">${calGrid}</div>
              <div class="border-t border-neutral-800 pt-6">
                <div class="flex items-center justify-between mb-4 border-l-4 border-red-600 pl-3"><h3 class="font-bold text-gray-200">${displayTitle}</h3><button onclick="openAdminModal(null, false)" class="text-[10px] font-bold text-red-500">${T.add}</button></div>
                <div class="flex flex-col gap-3">${displayData.length > 0 ? displayData.map(item => createAdminCardHTML(item)).join('') : `<div class="text-center text-gray-500 text-sm py-10">${T.guideContact}</div>`}</div>
              </div>
            </div>
          `;
        } else if (state.adminTab === 'import') {
          const selectedCount = IMPORTED_TEMP_DATA.filter(i => i.selected).length;
          const allSelected = IMPORTED_TEMP_DATA.length > 0 && IMPORTED_TEMP_DATA.every(i => i.selected);

          contentHTML = `
            <div class="animate-in fade-in duration-300">
              <div class="mb-6 px-1">
                <h2 class="text-xl font-bold text-white flex items-center gap-2 mb-4"><i data-lucide="download-cloud" class="w-5 h-5 text-red-500"></i> ${T.importTitle}</h2>
                
                <div class="bg-[#1a1a1a] border border-neutral-800 rounded-2xl p-4 flex flex-col gap-4 mb-6">
                  <div class="flex items-center gap-2 mb-1">
                    <i data-lucide="twitter" class="w-4 h-4 text-[#1DA1F2]"></i>
                    <h3 class="font-bold text-sm text-white">트위터 데이터 수집 (API)</h3>
                  </div>
                  <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-gray-500 font-bold ml-1">트위터 계정 아이디 (@제외)</label>
                    <input type="text" id="twitter-id" onclick="event.stopPropagation()" placeholder="예: NFlyingofficial" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-[#1DA1F2] transition-colors">
                  </div>
                  <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1">
                      <label class="text-[10px] text-gray-500 font-bold ml-1">시작 날짜</label>
                      <input type="date" id="twitter-start-date" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-[#1DA1F2] transition-colors">
                    </div>
                    <div class="flex flex-col gap-1">
                      <label class="text-[10px] text-gray-500 font-bold ml-1">종료 날짜</label>
                      <input type="date" id="twitter-end-date" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-[#1DA1F2] transition-colors">
                    </div>
                  </div>
                  <button id="twitter-fetch-btn" onclick="handleTwitterFetch()" class="w-full bg-[#1DA1F2] hover:bg-[#1a8cd8] py-3 rounded-xl font-bold text-sm transition-colors text-white">트윗 수집하여 Raw 시트에 추가하기</button>
                </div>

                <div class="border-b border-neutral-800 mb-6"></div>

                <div class="flex items-center gap-2 mb-3">
                  <i data-lucide="database" class="w-4 h-4 text-gray-400"></i>
                  <h3 class="font-bold text-sm text-gray-300">Raw 데이터 조회 및 게시</h3>
                </div>
                <div class="bg-[#1a1a1a] border border-neutral-800 rounded-2xl p-4 flex flex-col gap-4 mb-6">
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importId}</label><input type="text" id="import-id" value="${state.importTempId}" oninput="updateImportFields()" onclick="event.stopPropagation()" placeholder="계정명 혹은 ID" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                  <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importStart}</label><input type="date" id="import-start-date" value="${state.importStartDate}" oninput="updateImportFields()" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importEnd}</label><input type="date" id="import-end-date" value="${state.importEndDate}" oninput="updateImportFields()" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                  </div>
                  <button onclick="handleImportFetch()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold text-sm transition-colors">${T.importBtn}</button>
                </div>
                
                ${IMPORTED_TEMP_DATA.length > 0 ? `
                  <div class="flex justify-between items-center mb-3 px-1">
                    <label class="flex items-center gap-2 text-xs font-bold text-gray-300 cursor-pointer">
                      <input type="checkbox" id="import-select-all" onchange="toggleImportSelectAll(event)" ${allSelected ? 'checked' : ''} class="w-4 h-4 rounded bg-[#111] border-neutral-700 text-red-600 focus:ring-red-600">
                      <span>전체 선택</span>
                    </label>
                    <div class="flex gap-2">
                      <button id="bulk-delete-btn" onclick="deleteRawData(event)" class="bg-red-900/20 text-red-500 hover:text-red-400 text-xs font-bold px-3 py-2 rounded-lg active:scale-95 transition-all flex items-center gap-1">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> 선택 삭제
                      </button>
                      <button id="bulk-publish-btn" onclick="publishSelectedRawData(event)" class="bg-red-600 text-white text-xs font-bold px-3 py-2 rounded-lg active:scale-95 transition-all flex items-center gap-1">
                        <i data-lucide="send" class="w-3 h-3"></i> 선택 게시 <span id="bulk-publish-count">${selectedCount > 0 ? `(${selectedCount}개)` : ''}</span>
                      </button>
                    </div>
                  </div>
                ` : ''}

                <div class="flex flex-col gap-3">
                  ${IMPORTED_TEMP_DATA.length > 0
                    ? IMPORTED_TEMP_DATA.map((item, idx) => `
                        <div class="bg-[#1a1a1a] p-3.5 rounded-2xl border border-neutral-800 flex gap-3 hover:border-neutral-700 transition-colors relative">
                          <div class="flex items-center justify-center pl-1 pr-1">
                            <input type="checkbox" id="import-cb-${idx}" onchange="toggleImportSelect(${idx})" ${item.selected ? 'checked' : ''} class="w-4 h-4 rounded bg-[#111] border-neutral-700 text-red-600 focus:ring-red-600 cursor-pointer">
                          </div>
                          <div class="w-16 h-16 shrink-0 rounded-xl overflow-hidden bg-neutral-800"><img src="${item.img || 'https://via.placeholder.com/80'}" class="w-full h-full object-cover"></div>
                          <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
                            <div>
                              <div class="text-[10px] font-medium text-gray-400 truncate mb-0.5">계정: ${item.account || '-'} | ${item.date || '---'}</div>
                              <div class="text-xs font-bold text-white line-clamp-1">${item.title}</div>
                            </div>
                            <div class="flex gap-2 mt-2 justify-end">
                              <button onclick="openAdminModal(${idx}, true)" class="text-[10px] font-bold bg-neutral-800 hover:bg-neutral-700 text-gray-300 hover:text-white px-3 py-1.5 rounded-lg active:scale-95 transition-all flex items-center gap-1"><i data-lucide="edit-3" class="w-3 h-3"></i> 수정</button>
                              <button id="del-raw-btn-${idx}" onclick="deleteRawData(${idx})" class="text-[10px] font-bold bg-red-900/10 hover:bg-red-900/30 text-red-500 hover:text-red-400 px-3 py-1.5 rounded-lg active:scale-95 transition-all flex items-center gap-1"><i data-lucide="trash-2" class="w-3 h-3"></i> 삭제</button>
                              <button id="publish-btn-${idx}" onclick="publishSelectedRawData(${idx})" class="text-[10px] font-bold bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg active:scale-95 transition-all flex items-center gap-1"><i data-lucide="send" class="w-3 h-3"></i> 게시하기</button>
                            </div>
                          </div>
                        </div>
                      `).join('')
                    : (state.hasSearchedImport ? `<div class="text-center text-gray-500 text-sm py-8">조건에 맞는 데이터가 없습니다.</div>` : '')
                  }
                </div>
              </div>
            </div>
          `;
        }

        if (state.isEditModalOpen) {
          let item = { mainType: state.adminTempMainType, type: '', date: state.selectedDate || todayStr, title: '', img: '', link: '', rawKeywords: '' };
          if (state.adminEditingId !== null) {
            item = state.adminEditingRaw ? IMPORTED_TEMP_DATA[state.adminEditingId] : MOCK_ARCHIVE_DATA.find(d => d.id === Number(state.adminEditingId));
          }
          let displayDate = item.date || '';
          if (displayDate && !displayDate.includes('-') && displayDate.length === 8) displayDate = `${displayDate.slice(0,4)}-${displayDate.slice(4,6)}-${displayDate.slice(6,8)}`;
          
          contentHTML += `
            <div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onclick="event.stopPropagation()">
              <form onsubmit="saveData(event)" class="bg-[#1a1a1a] w-full max-sm rounded-2xl p-6 border border-neutral-700 flex flex-col gap-4 animate-in zoom-in-95 duration-200 shadow-2xl overflow-y-auto max-h-[90vh] custom-scrollbar">
                <div class="flex justify-between items-center">
                  <h3 class="font-bold text-lg text-white">${state.adminEditingRaw ? "Raw 데이터 수정" : (state.adminEditingId !== null ? T.edit : T.add)}</h3>
                  <button type="button" onclick="closeAdminModal()" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-gray-500 font-bold ml-1">${T.subCat}</label>
                    <select id="form-type" onchange="handleAdminSubCatChange(this.value)" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none">
                      ${Object.values(CATEGORIES).flat().map(k => `<option value="${k}" ${item.type === k ? 'selected' : ''}>${getT(k)}</option>`).join('')}
                    </select>
                  </div>
                  <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-gray-500 font-bold ml-1">${T.mainCat}</label>
                    <select id="form-mainType" disabled class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-gray-400 focus:outline-none opacity-70">
                      ${Object.keys(CATEGORIES).map(k => `<option value="${k}" ${k === state.adminTempMainType ? 'selected' : ''}>${getT(k)}</option>`).join('')}
                    </select>
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.date}</label><input type="date" id="form-date" value="${displayDate}" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.keywordCat}</label><select id="form-keywords" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"><option value="">${T.all}</option>${KEYWORDS.map(kw => `<option value="${kw}" ${item.rawKeywords === kw ? 'selected' : ''}>${getT(kw)}</option>`).join('')}</select></div>
                </div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.title}</label><input type="text" id="form-title" placeholder="${T.title}" value="${(item.title || '').replace(/"/g, '&quot;')}" required class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.landingLink}</label><input type="url" id="form-link" value="${item.link || ''}" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.thumbUrl}</label><div class="flex gap-2"><input type="url" id="form-img" value="${item.img || ''}" class="flex-1 bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"><button type="button" id="btn-extract" onclick="extractThumbnail()" class="shrink-0 bg-neutral-800 hover:bg-neutral-700 px-4 py-2 rounded-xl text-xs font-bold text-gray-300 transition-colors flex items-center gap-1"><i data-lucide="image-plus" class="w-4 h-4"></i> ${T.extract}</button></div></div>
                <div class="flex justify-end gap-2 mt-4"><button type="button" onclick="closeAdminModal()" class="px-5 py-2.5 text-xs bg-neutral-800 hover:bg-neutral-700 rounded-xl font-bold text-gray-300 transition-colors">${T.cancel}</button><button type="submit" id="modal-save-btn" class="px-5 py-2.5 text-xs bg-red-600 hover:bg-red-500 rounded-xl font-bold text-white shadow-lg shadow-red-900/40 transition-colors">${T.save}</button></div>
              </form>
            </div>
          `;
        }
      } else {
        const tabs = [{ id: 'archive', icon: 'folder', label: T.archive }, { id: 'keyword', icon: 'heart', label: T.keyword }, { id: 'calendar', icon: 'calendar', label: T.calendar }];
        mainTabsContainer.innerHTML = tabs.map(tab => `<button onclick="setMainTab('${tab.id}')" class="flex-1 flex justify-center items-center gap-1.5 py-3 text-sm font-bold border-b-2 transition-colors ${state.activeMainTab === tab.id ? 'border-red-600 text-white' : 'border-transparent text-gray-500'}"><i data-lucide="${tab.icon}" class="w-4 h-4"></i>${tab.label}</button>`).join('');
        document.getElementById('search-container').style.display = 'block';

        if (state.activeMainTab === 'keyword') {
          let keywordData = MOCK_ARCHIVE_DATA.filter(item => { if (state.activeKeyword === '전체') return item.rawKeywords && item.rawKeywords.trim() !== ''; return (item.rawKeywords === state.activeKeyword); });
          keywordData = getSortedData(getSearchFilteredData(keywordData));
          const visibleData = keywordData.slice(0, state.displayLimit);
          contentHTML = `
            <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-4 pb-1">
              ${['전체', ...KEYWORDS].map(kw => `<button onclick="setKeyword('${kw}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs font-bold border ${state.activeKeyword === kw ? 'bg-neutral-800 border-neutral-600 text-white' : 'border-transparent text-gray-500'}">${kw === '전체' ? T.all : getT(kw)}</button>`).join('')}
            </div>
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400"><span>${T.total} ${keywordData.length}${T.unit}</span><button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? T.latest : T.oldest}</button></div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${keywordData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${T.more}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'archive') {
          let archiveData = MOCK_ARCHIVE_DATA.filter(item => (state.activeSubTab === '전체 보기' || item.mainType === state.activeSubTab) && (state.activeCategory === '전체' || item.type === state.activeCategory));
          archiveData = getSortedData(getSearchFilteredData(archiveData));
          const visibleData = archiveData.slice(0, state.displayLimit);
          contentHTML = `
            <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-3 pb-1">${MAIN_TABS_LIST.map(tab => `<button onclick="setSubTab('${tab}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs font-bold border ${state.activeSubTab === tab ? 'bg-neutral-800 border-neutral-600 text-white' : 'border-transparent text-gray-500'}">${getT(tab)}</button>`).join('')}</div>
            ${state.activeSubTab !== '전체 보기' ? `
              <div class="mb-6 -mt-1">
                <div class="flex flex-wrap gap-1.5">
                  <button onclick="setCategory('전체')" class="px-2.5 py-1 rounded-lg text-[11px] font-bold transition-all ${state.activeCategory === '전체' ? 'bg-red-600 text-white shadow-md shadow-red-900/20' : 'bg-[#1a1a1a] border border-neutral-800 text-gray-400 hover:border-neutral-600 hover:text-gray-200'}">${T.all}</button>
                  ${(CATEGORIES[state.activeSubTab] || []).map(cat => `<button onclick="setCategory('${cat}')" class="px-2.5 py-1 rounded-lg text-[11px] font-bold transition-all ${state.activeCategory === cat ? 'bg-red-600 text-white shadow-md shadow-red-900/20' : 'bg-[#1a1a1a] border border-neutral-800 text-gray-400 hover:border-neutral-600 hover:text-gray-200'}">${getT(cat)}</button>`).join('')}
                </div>
              </div>
            ` : ''}
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400"><span>${T.total} ${archiveData.length}${T.unit}</span><button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? T.latest : T.oldest}</button></div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${archiveData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${T.more}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'calendar') {
          const daysInMonth = new Date(state.viewYear, state.viewMonth, 0).getDate();
          const firstDay = new Date(state.viewYear, state.viewMonth - 1, 1).getDay();
          const monthKey = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}`;
          const currentMonthData = MOCK_ARCHIVE_DATA.filter(item => item.date && item.date.startsWith(monthKey));
          const activeDays = currentMonthData.map(item => parseInt(item.date.split('-')[2]));
          
          if (state.selectedDate && !state.selectedDate.startsWith(monthKey)) {
            state.selectedDate = null;
          }

          let calGrid = '';
          for(let i=0; i<firstDay; i++) calGrid += `<div></div>`;
          for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const isToday = todayStr === dateStr;
            calGrid += `<div onclick="setSelectedDate('${dateStr}')" class="flex flex-col items-center justify-center h-12 cursor-pointer group"><div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold ${isSelected ? 'bg-red-600 text-white' : isToday ? 'text-red-500 bg-neutral-800' : 'text-gray-300 group-hover:bg-neutral-800'}">${d}</div>${activeDays.includes(d) ? `<div class="w-1 h-1 bg-red-500 rounded-full mt-0.5"></div>` : ''}</div>`;
          }
          
          let displayData = [];
          let displayTitle = '';
          
          if (state.selectedDate) {
            displayData = getSortedData(getSearchFilteredData(MOCK_ARCHIVE_DATA.filter(item => item.date === state.selectedDate)));
            displayTitle = `${state.selectedDate} (${displayData.length}${T.unit})`;
          } else {
            displayData = getSortedData(getSearchFilteredData(currentMonthData));
            displayTitle = `${state.viewMonth}${T.month} ${T.archive} (${displayData.length}${T.unit})`;
          }
          
          contentHTML = `
            <div class="animate-in fade-in duration-300">
              ${getCalendarHeaderHTML()}
              <div class="grid grid-cols-7 text-[10px] text-gray-500 font-bold mb-2 text-center"><div>${T.daySun}</div><div>${T.dayMon}</div><div>${T.dayTue}</div><div>${T.dayWed}</div><div>${T.dayThu}</div><div>${T.dayFri}</div><div>${T.daySat}</div></div>
              <div class="grid grid-cols-7 gap-y-1 mb-8">${calGrid}</div>
              <div class="border-t border-neutral-800 pt-6">
                <div class="flex items-center gap-2 mb-4 border-l-4 border-red-600 pl-3">
                  <h3 class="font-bold text-gray-200">${displayTitle}</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">${displayData.length > 0 ? displayData.map(item => createCardHTML(item)).join('') : `<div class="col-span-2 text-center text-gray-500 text-sm py-10">${T.empty}</div>`}</div>
              </div>
            </div>
          `;
        }
      }
      contentArea.innerHTML = contentHTML;
      lucide.createIcons();
    }

    loadSheetData();
  </script>
</body>
</html>
